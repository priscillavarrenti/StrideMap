<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Priscilla Varrenti">
        <meta name="description" content="A web page for my Final Project called StrideMap, Its going to help runners improve their skills and learn more deeply about techniques. This page is going to be using two APIs, MapBox and Youtube API">
        <title>StrideMap</title>
        
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Open+Sans&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <h1>StrideMap</h1>

        <img id="map" alt="Map view"/>

        <button id="locateBtn">Use My Location</button>

        <form id="form">
            <input type="number" id="distance" placeholder="Distance (km)" required>
            <input type="number" id="time" placeholder="Time (min)" required>
            <input type="date" id="date" required>
            <button type="submit">Save Run</button>
        </form>

        <ul id="runs"></ul>

        <script type="module" src="js/main.js"></script>
    </body>
    <footer>
        <p>&copy; 2026 StrideMap. All rights reserved. Not a real application.</p>
    </footer>
</html>
